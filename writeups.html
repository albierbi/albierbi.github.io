<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Writeups | Alberto Erbusti</title>
  <meta name="description" content="CTF and lab writeups by Alberto Erbusti — TryHackMe, HackTheBox, and CTF competitions.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0a0c0f;
      --bg2:    #111318;
      --bg3:    #1a1d24;
      --border: #22262e;
      --text:   #e2e8f0;
      --muted:  #64748b;
      --subtle: #94a3b8;
      --accent: #38bdf8;
      --accent2:#818cf8;
      --green:  #34d399;
      --mono:   "Courier New", Courier, monospace;
      --sans:   -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      height: 60px;
      background: rgba(10,12,15,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .nav-logo span { color: var(--muted); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }

    .nav-links a {
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 1px;
      background: var(--accent);
      transform: scaleX(0);
      transition: transform 0.2s;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }
    .nav-links a.active { color: var(--text); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 8rem 2.5rem 3rem;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
    }

    .page-header-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }

    .page-header-label::before { content: '// '; color: var(--muted); }

    .page-header h1 {
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .page-header p {
      color: var(--subtle);
      font-size: 0.95rem;
      max-width: 520px;
    }

    /* ── LAYOUT ── */
    .layout {
      max-width: 900px;
      margin: 0 auto;
      padding: 2.5rem 2.5rem 5rem;
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 3rem;
      align-items: start;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      position: sticky;
      top: 80px;
    }

    .sidebar-section { margin-bottom: 2rem; }

    .sidebar-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid var(--border);
    }

    .filter-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 7px 10px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
      margin-bottom: 2px;
    }

    .filter-btn:hover { background: var(--bg3); color: var(--text); }

    .filter-btn.active {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .filter-btn .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .filter-btn.active .dot { opacity: 1; }

    .filter-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .cnt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--bg3);
      padding: 1px 6px;
      border-radius: 8px;
      min-width: 20px;
      text-align: center;
    }

    /* ── MAIN ── */
    .main { min-width: 0; }

    .search-wrap {
      position: relative;
      margin-bottom: 1.5rem;
    }

    .search-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px 10px 36px;
      font-size: 13px;
      font-family: var(--sans);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: rgba(56,189,248,0.4); }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .results-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .results-label span { color: var(--accent); }

    /* ── CARDS ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: rgba(56,189,248,0.3);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }

    .platform-badge {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .badge-thm { background: #0f1929; color: #38bdf8; border: 1px solid #1e3a5f; }
    .badge-htb { background: #0a1f12; color: #34d399; border: 1px solid #14532d; }
    .badge-ctf { background: #1a1030; color: #818cf8; border: 1px solid #3730a3; }

    .diff-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .diff-easy   { color: #34d399; background: #052e16; }
    .diff-medium { color: #fbbf24; background: #1c1003; }
    .diff-hard   { color: #f87171; background: #1f0a0a; }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.4rem;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 0.85rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 0.85rem;
    }

    .tag {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding-top: 0.6rem;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .empty-state::before {
      display: block;
      content: '// no results';
      color: var(--accent);
      margin-bottom: 0.5rem;
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      nav { padding: 0 1.25rem; }
      .nav-links { gap: 1.25rem; }
      .page-header { padding: 6rem 1.25rem 2rem; }
      .layout { grid-template-columns: 1fr; padding: 1.5rem 1.25rem 4rem; gap: 1.5rem; }
      .sidebar { position: static; }
      .sidebar-section { display: flex; flex-wrap: wrap; gap: 6px; }
      .sidebar-label { width: 100%; }
      .filter-btn { width: auto; padding: 5px 10px; }
      footer { flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="index.html"><span>~/</span>albierbi</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="writeups.html" class="active">Writeups</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <p class="page-header-label">writeups</p>
    <h1>Security Writeups</h1>
    <p>Notes and solutions from CTFs, TryHackMe rooms, and HackTheBox machines. Written to learn, not just to document.</p>
  </div>

  <!-- LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Platform</div>
        <button class="filter-btn active" data-filter="platform" data-value="all" onclick="setFilter('platform','all',this)">
          All
        </button>
        <button class="filter-btn" data-filter="platform" data-value="thm" onclick="setFilter('platform','thm',this)">
          <span>TryHackMe</span>
          <div class="filter-right">
            <div class="dot" style="background:#38bdf8"></div>
            <span class="cnt" id="cnt-thm">0</span>
          </div>
        </button>
        <button class="filter-btn" data-filter="platform" data-value="htb" onclick="setFilter('platform','htb',this)">
          <span>HackTheBox</span>
          <div class="filter-right">
            <div class="dot" style="background:#34d399"></div>
            <span class="cnt" id="cnt-htb">0</span>
          </div>
        </button>
        <button class="filter-btn" data-filter="platform" data-value="ctf" onclick="setFilter('platform','ctf',this)">
          <span>CTF</span>
          <div class="filter-right">
            <div class="dot" style="background:#818cf8"></div>
            <span class="cnt" id="cnt-ctf">0</span>
          </div>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Difficulty</div>
        <button class="filter-btn active" data-filter="diff" data-value="all" onclick="setFilter('diff','all',this)">All</button>
        <button class="filter-btn" data-filter="diff" data-value="easy" onclick="setFilter('diff','easy',this)">
          <span>Easy</span>
          <div class="dot" style="background:#34d399"></div>
        </button>
        <button class="filter-btn" data-filter="diff" data-value="medium" onclick="setFilter('diff','medium',this)">
          <span>Medium</span>
          <div class="dot" style="background:#fbbf24"></div>
        </button>
        <button class="filter-btn" data-filter="diff" data-value="hard" onclick="setFilter('diff','hard',this)">
          <span>Hard</span>
          <div class="dot" style="background:#f87171"></div>
        </button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="search-wrap">
        <span class="search-prefix">/</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Search by title, tag, or topic..." oninput="render()">
      </div>

      <div class="results-bar">
        <span class="results-label">showing <span id="resultsCount">0</span> writeups</span>
      </div>

      <div class="cards-grid" id="grid"></div>
    </main>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>&copy; 2026 Alberto Erbusti</span>
    <a href="index.html" style="color: var(--accent); text-decoration: none;">← back home</a>
  </footer>

  <script>
    /* ── DATA ──────────────────────────────────────────────
       Add your writeups here. Each entry becomes a card.
       href points to the individual writeup HTML file.
    ────────────────────────────────────────────────────── */
    const writeups = [
      {
        title: "Mr Robot CTF",
        platform: "thm",
        difficulty: "medium",
        desc: "WordPress exploitation, brute-forcing, and privilege escalation through a Mr. Robot-themed machine.",
        tags: ["web", "wordpress", "privesc"],
        date: "2025-04-01",
        href: "writeups/thm-mrrobot.html"
      },
      {
        title: "Basic Pentesting",
        platform: "thm",
        difficulty: "easy",
        desc: "Enumeration, SSH brute-force, and privilege escalation via a weak sudo configuration.",
        tags: ["enum", "ssh", "privesc"],
        date: "2025-01-10",
        href: "writeups/thm-basic-pentesting.html"
      },
      {
        title: "Network Services",
        platform: "thm",
        difficulty: "medium",
        desc: "Deep dive into SMB, Telnet, FTP enumeration and exploitation basics.",
        tags: ["smb", "ftp", "network"],
        date: "2025-02-03",
        href: "writeups/thm-network-services.html"
      },
      {
        title: "Starting Point — Meow",
        platform: "htb",
        difficulty: "easy",
        desc: "First HTB machine. Telnet misconfiguration giving direct root access.",
        tags: ["telnet", "enum"],
        date: "2025-03-15",
        href: "writeups/htb-meow.html"
      },
      {
        title: "picoCTF 2025 — Buffer Overflow",
        platform: "ctf",
        difficulty: "medium",
        desc: "Stack overflow challenge. Buffer analysis and crafting a basic ret2win payload.",
        tags: ["pwn", "bof", "reversing"],
        date: "2025-03-22",
        href: "writeups/pico2025-bof.html"
      },
      {
        title: "Advent of Cyber 2024 — Day 1",
        platform: "thm",
        difficulty: "easy",
        desc: "Introduction to OPSEC concepts through a fictional scenario involving malicious YouTube links.",
        tags: ["opsec", "osint", "recon"],
        date: "2024-12-01",
        href: "writeups/thm-advent-2024-day1.html"
      }
    ];

    const platformLabel = { thm: "TryHackMe", htb: "HackTheBox", ctf: "CTF" };
    const filters = { platform: "all", diff: "all" };

    function setFilter(type, value, btn) {
      filters[type] = value;
      document.querySelectorAll(`[data-filter="${type}"]`).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      render();
    }

    function render() {
      const q = document.getElementById("searchInput").value.toLowerCase().trim();
      const grid = document.getElementById("grid");

      const filtered = writeups.filter(w => {
        const matchPlatform = filters.platform === "all" || w.platform === filters.platform;
        const matchDiff     = filters.diff === "all"     || w.difficulty === filters.diff;
        const matchSearch   = !q
          || w.title.toLowerCase().includes(q)
          || w.desc.toLowerCase().includes(q)
          || w.tags.some(t => t.includes(q));
        return matchPlatform && matchDiff && matchSearch;
      });

      document.getElementById("resultsCount").textContent = filtered.length;

      ["thm","htb","ctf"].forEach(p => {
        document.getElementById(`cnt-${p}`).textContent =
          writeups.filter(w => w.platform === p).length;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state">no writeups match your filters</div>`;
        return;
      }

      grid.innerHTML = filtered.map(w => `
        <a class="card" href="${w.href}">
          <div class="card-top">
            <span class="platform-badge badge-${w.platform}">${platformLabel[w.platform]}</span>
            <span class="diff-badge diff-${w.difficulty}">${w.difficulty}</span>
          </div>
          <div class="card-title">${w.title}</div>
          <div class="card-desc">${w.desc}</div>
          <div class="card-tags">${w.tags.map(t => `<span class="tag">${t}</span>`).join("")}</div>
          <div class="card-footer">${w.date}</div>
        </a>
      `).join("");
    }

    render();
  </script>

</body>
</html>
