<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writeups | Alberto Erbusti</title>
  <meta name="description" content="CTF and lab writeups by Alberto Erbusti — TryHackMe, HackTheBox, and CTF competitions.">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav>
    <a class="nav-logo" href="../index.html"><span>~/</span>albierbi</a>
    <ul class="nav-links">
      <li><a href="../index.html#about">About</a></li>
      <li><a href="../writeups/" class="active">Writeups</a></li>
      <li><a href="../contact.html">Contact</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <p class="page-header-label">writeups</p>
    <h1>Security Writeups</h1>
    <p>Notes and solutions from CTFs, TryHackMe rooms, and HackTheBox machines. Written to learn, not just to document.</p>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Platform</div>
        <button class="filter-btn active" data-filter="platform" data-value="all">All</button>
        <button class="filter-btn" data-filter="platform" data-value="thm">
          <span>TryHackMe</span>
          <div class="filter-right">
            <div class="dot dot-blue"></div>
            <span class="cnt" id="cnt-thm">0</span>
          </div>
        </button>
        <button class="filter-btn" data-filter="platform" data-value="htb">
          <span>HackTheBox</span>
          <div class="filter-right">
            <div class="dot dot-green"></div>
            <span class="cnt" id="cnt-htb">0</span>
          </div>
        </button>
        <button class="filter-btn" data-filter="platform" data-value="ctf">
          <span>CTF</span>
          <div class="filter-right">
            <div class="dot dot-purple"></div>
            <span class="cnt" id="cnt-ctf">0</span>
          </div>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-label">Difficulty</div>
        <button class="filter-btn active" data-filter="diff" data-value="all">All</button>
        <button class="filter-btn" data-filter="diff" data-value="easy">
          <span>Easy</span>
          <div class="dot dot-green"></div>
        </button>
        <button class="filter-btn" data-filter="diff" data-value="medium">
          <span>Medium</span>
          <div class="dot dot-yellow"></div>
        </button>
        <button class="filter-btn" data-filter="diff" data-value="hard">
          <span>Hard</span>
          <div class="dot dot-red"></div>
        </button>
      </div>
    </aside>

    <main class="main">
      <div class="search-wrap">
        <span class="search-prefix">/</span>
        <input class="search-input" type="text" id="searchInput" placeholder="Search by title, tag, or topic...">
      </div>
      <div class="results-bar">
        <span class="results-label">showing <span id="resultsCount">0</span> writeups</span>
      </div>
      <div class="cards-grid" id="grid"></div>
    </main>

  </div>

  <footer>
    <span>&copy; 2026 Alberto Erbusti</span>
    <a href="../index.html" class="footer-back">&larr; back home</a>
  </footer>

  <script src="writeups.js"></script>

</body>
</html>
